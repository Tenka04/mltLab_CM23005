<!DOCTYPE html>
<html>
<head>
    <title>Lab 3: Performance Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { position: relative; display: inline-block; margin-top: 20px; }
        video, canvas { border: 2px solid #ccc; border-radius: 8px; border-bottom: none; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        canvas { position: absolute; top: 0; left: 0; }
        .stats { background: #2c3e50; color: white; width: 640px; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; padding: 15px; box-sizing: border-box; display: flex; justify-content: space-around; font-family: monospace; font-size: 18px; border: 2px solid #ccc; border-top: none; }
        #status { font-weight: bold; margin-bottom: 10px; color: #e74c3c; }
    </style>
</head>
<body>

    <h1>Lab Assignment 3: FPS & Performance Measurement</h1>
    <p>Measure and analyze the FPS impact of real-time object detection.</p>
    
    <div id="status">Loading COCO-SSD Model...</div>

    <div class="wrapper">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    <div class="stats">
        <div>FPS: <span id="fps">0</span></div>
        <div>Inference Time: <span id="inferenceTime">0</span> ms</div>
    </div>

<script>
    let net;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    const timeEl = document.getElementById('inferenceTime');

    let fpsFrames = 0;
    let lastFpsTime = 0;

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
        video.srcObject = stream;
        return new Promise(resolve => { video.onloadedmetadata = () => resolve(video); });
    }

    async function detect(time) {
        // Measure FPS
        if (time - lastFpsTime >= 1000) {
            fpsEl.innerText = fpsFrames;
            fpsFrames = 0;
            lastFpsTime = time;
        }
        fpsFrames++;

        // Measure Inference Time
        const t0 = performance.now();
        const objects = await net.detect(video);
        const t1 = performance.now();
        timeEl.innerText = (t1 - t0).toFixed(1);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        objects.forEach(obj => {
            const [x, y, width, height] = obj.bbox;
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = '#e74c3c';
            ctx.font = '16px monospace';
            ctx.fillText(`${obj.class} (${(obj.score * 100).toFixed(0)}%)`, x + 5, y > 20 ? y - 6 : y + 20);
        });

        requestAnimationFrame(detect);
    }

    async function main() {
        net = await cocoSsd.load();
        statusText.innerText = 'Starting Camera...';
        await setupCamera();
        video.play();
        statusText.innerText = 'Monitoring Performance...';
        lastFpsTime = performance.now();
        requestAnimationFrame(detect);
    }

    main();
</script>

</body>
</html>
