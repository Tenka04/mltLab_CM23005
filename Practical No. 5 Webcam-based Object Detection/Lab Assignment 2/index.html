<!DOCTYPE html>
<html>
<head>
    <title>Lab 2: Overlay Classification Labels</title>
    <!-- TensorFlow.js and COCO-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { position: relative; display: inline-block; margin-top: 20px; }
        video, canvas { border: 2px solid #ccc; border-radius: 8px; }
        canvas { position: absolute; top: 0; left: 0; }
        #status { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>Lab Assignment 2: Overlay Labels (COCO-SSD)</h1>
    <p>Real-time object detection with bounding box and label overlay.</p>
    
    <div id="status">Loading COCO-SSD...</div>

    <div class="wrapper">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

<script>
    let net;
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
        video.srcObject = stream;
        return new Promise(resolve => { video.onloadedmetadata = () => resolve(video); });
    }

    async function detect() {
        const objects = await net.detect(video);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw bounding boxes and labels
        objects.forEach(obj => {
            const [x, y, width, height] = obj.bbox;
            
            // Draw box
            ctx.strokeStyle = '#2ecc71';
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, width, height);
            
            // Draw background for text
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(x, y - 25, width, 25);
            
            // Draw label
            ctx.fillStyle = 'white';
            ctx.font = '18px Arial';
            ctx.fillText(`${obj.class} (${(obj.score * 100).toFixed(0)}%)`, x + 5, y - 7);
        });

        requestAnimationFrame(detect);
    }

    async function main() {
        net = await cocoSsd.load();
        statusText.innerText = 'Starting Camera...';
        await setupCamera();
        video.play();
        statusText.innerText = 'Detecting Objects...';
        detect();
    }

    main();
</script>

</body>
</html>
