<!DOCTYPE html>
<html>
<head>
    <title>Lab 3: Single vs Multi Pose Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { position: relative; display: inline-block; margin-top: 10px; }
        video, canvas { border: 2px solid #ccc; border-radius: 8px; }
        canvas { position: absolute; top: 0; left: 0; }
        .stats { display: flex; gap: 20px; margin-top: 20px; }
        .panel { padding: 15px; background: #f4f4f4; border-radius: 8px; width: 300px; text-align: center; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Lab Assignment 3: Single vs Multi-Pose</h1>
    <p>Analyze accuracy differences between single-pose and multi-pose detection.</p>
    
    <div>
        <button id="toggleBtn">Switch to Multi-Pose</button>
    </div>
    
    <div class="wrapper">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="output" width="640" height="480"></canvas>
    </div>

    <div class="stats">
        <div class="panel">
            <h3>Mode</h3>
            <p id="modeText">Single-Pose</p>
        </div>
        <div class="panel">
            <h3>Inference Time (ms)</h3>
            <p id="timeText">0</p>
        </div>
        <div class="panel">
            <h3>People Detected</h3>
            <p id="peopleCount">0</p>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('output');
    const ctx = canvas.getContext('2d');
    
    let isMultiPose = false;
    document.getElementById('toggleBtn').addEventListener('click', (e) => {
        isMultiPose = !isMultiPose;
        e.target.innerText = isMultiPose ? "Switch to Single-Pose" : "Switch to Multi-Pose";
        document.getElementById('modeText').innerText = isMultiPose ? "Multi-Pose" : "Single-Pose";
    });

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
        video.srcObject = stream;
        return new Promise((resolve) => { video.onloadedmetadata = () => resolve(video); });
    }

    function drawKeypoints(keypoints, minConfidence, ctx, color='red') {
        keypoints.forEach((k) => {
            if (k.score > minConfidence) {
                ctx.beginPath();
                ctx.arc(k.position.x, k.position.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
            }
        });
    }

    async function detectPose(model) {
        const t0 = performance.now();
        let poses = [];
        
        if (isMultiPose) {
            poses = await model.estimateMultiplePoses(video, { flipHorizontal: false, maxDetections: 5 });
        } else {
            const pose = await model.estimateSinglePose(video, { flipHorizontal: false });
            poses = [pose];
        }
        
        const t1 = performance.now();
        document.getElementById('timeText').innerText = Math.round(t1 - t0);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let validPoses = 0;
        poses.forEach(pose => {
            if (pose.score >= 0.1) {
                validPoses++;
                drawKeypoints(pose.keypoints, 0.5, ctx, isMultiPose ? 'blue' : 'red');
            }
        });
        
        document.getElementById('peopleCount').innerText = validPoses;
        
        requestAnimationFrame(() => detectPose(model));
    }

    async function main() {
        await setupCamera();
        video.play();
        const net = await posenet.load({ architecture: 'MobileNetV1', outputStride: 16, multiplier: 0.75 });
        detectPose(net);
    }

    main();
</script>

</body>
</html>
